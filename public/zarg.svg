<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Glow effect -->
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Alien Body -->
    <path d="M50 150 Q100 180 150 150 L160 80 Q100 50 40 80 Z" fill="#ff00bb" filter="url(#glow)" />
    
    <!-- Alien Head -->
    <circle cx="100" cy="70" r="40" fill="#ff00bb" filter="url(#glow)" />
    
    <!-- Eyes -->
    <ellipse cx="80" cy="65" rx="12" ry="18" fill="#00ffff" transform="rotate(-15 80 65)" />
    <ellipse cx="120" cy="65" rx="12" ry="18" fill="#00ffff" transform="rotate(15 120 65)" />
    
    <!-- Pupils -->
    <circle cx="82" cy="60" r="4" fill="#000033" />
    <circle cx="118" cy="60" r="4" fill="#000033" />
    
    <!-- Antennas -->
    <line x1="80" y1="40" x2="60" y2="10" stroke="#00ffff" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <circle cx="60" cy="10" r="6" fill="#00ffff" filter="url(#glow)" />
    
    <line x1="120" y1="40" x2="140" y2="10" stroke="#00ffff" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
    <circle cx="140" cy="10" r="6" fill="#00ffff" filter="url(#glow)" />
    
    <!-- Mouth -->
    <path d="M85 90 Q100 100 115 90" stroke="#00ffff" stroke-width="2" fill="none" stroke-linecap="round" />
</svg>
